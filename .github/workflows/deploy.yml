name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull all repos and deploy
        run: |
          cd /opt/apps/AICompAgent && git fetch origin main && git reset --hard origin/main
          cd /opt/apps/slides-generator && git fetch origin main && git reset --hard origin/main
          cd /opt/apps/data-owner-agent && git fetch origin main && git reset --hard origin/main
          cd /opt/apps/sahab && git fetch origin main && git reset --hard origin/main
          cd /opt/apps/Ai-Data-LandingPage && git fetch origin main && git reset --hard origin/main
          cd /opt/kpmg-infra && git fetch origin main && git reset --hard origin/main
          chmod +x /opt/kpmg-infra/scripts/*.sh
          ./scripts/deploy.sh