name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull all repos and deploy
        run: |
          cd /opt/apps/AICompAgent && git pull origin main
          cd /opt/apps/slides-generator && git pull origin main
          cd /opt/apps/data-owner-agent && git pull origin main
          cd /opt/apps/sahab && git pull origin main
          cd /opt/apps/Ai-Data-LandingPage && git pull origin main
          cd /opt/kpmg-infra && git pull origin main
          ./scripts/deploy.sh